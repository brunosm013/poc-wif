apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "char-wif.fullname" . }}
  namespace: {{ include "char-wif.namespace" . }}
  labels:
    {{- include "char-wif.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "char-wif.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "char-wif.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      serviceAccountName: {{ include "char-wif.serviceAccountName" . }}

      {{- if .Values.workloadIdentity.enabled }}
      automountServiceAccountToken: false
      {{- end }}

      {{- if or .Values.volumes .Values.workloadIdentity.enabled }}
      volumes:
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.workloadIdentity.enabled }}
        - name: workload-identity-token
          projected:
            sources:
              - serviceAccountToken:
                  audience: {{ .Values.workloadIdentity.audience | quote }}
                  expirationSeconds: {{ .Values.workloadIdentity.tokenExpirationSeconds }}
                  path: {{ .Values.workloadIdentity.tokenFileName | quote }}
        - name: workload-identity-credentials
          configMap:
            name: {{ include "char-wif.fullname" . }}-workload-identity
        {{- end }}
      {{- end }}

      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP

          {{- if or .Values.workloadIdentity.enabled .Values.envs }}
          env:
            {{- if .Values.workloadIdentity.enabled }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: {{ printf "%s/%s" .Values.workloadIdentity.credentialsMountPath .Values.workloadIdentity.credentialsFileName | quote }}
            {{- end }}
            {{- with .Values.envs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}

          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- if or .Values.volumeMounts .Values.workloadIdentity.enabled }}
          volumeMounts:
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if .Values.workloadIdentity.enabled }}
            - name: workload-identity-token
              mountPath: {{ .Values.workloadIdentity.tokenMountPath | quote }}
              readOnly: true
            - name: workload-identity-credentials
              mountPath: {{ .Values.workloadIdentity.credentialsMountPath | quote }}
              readOnly: true
            {{- end }}
          {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
