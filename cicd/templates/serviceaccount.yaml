{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "chart-wif.serviceAccountName" . }}
  namespace: {{ include "chart-wif.namespace" . }}
  labels:
    {{- include "chart-wif.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ if .Values.workloadIdentity.enabled }}false{{ else }}{{ .Values.serviceAccount.automount }}{{ end }}
{{- end }}
