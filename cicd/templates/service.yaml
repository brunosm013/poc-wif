apiVersion: v1
kind: Service
metadata:
  name: {{ include "char-wif.fullname" . }}
  namespace: {{ include "char-wif.namespace" . }}
  labels:
    {{- include "char-wif.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "char-wif.selectorLabels" . | nindent 4 }}
